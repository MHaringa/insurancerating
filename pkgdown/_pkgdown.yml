url: https://mharinga.github.io/insurancerating/

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "Google Sans Code"}

navbar:
  structure:
    left:  [home, articles, reference, news]
    right: [github]

articles:
  - title: "Workflow"
    contents:
      - getting-started
      - refinement-workflow
      - model-validation
  - title: "Background"
    contents:
      - pricing-principles

reference:
  - title: "Portfolio analysis"
    desc: >
      Analyse portfolio behaviour and inspect risk factors before model estimation.
    contents:
      - factor_analysis
      - autoplot.factor_analysis
      - outlier_histogram

  - title: "Tariff groups"
    desc: >
      Analyse continuous risk factors and convert them to tariff groups.
    contents:
      - risk_factor_gam
      - autoplot.riskfactor_gam
      - derive_tariff_groups
      - add_tariff_groups
      - autoplot.tariff_groups

  - title: "Modelling and interpretation"
    desc: >
      Estimate pricing models and interpret fitted coefficients in tariff terms.
    contents:
      - rating_table
      - autoplot.rating_table
      - add_prediction

  - title: "Refinement workflow"
    desc: >
      Apply structured tariff adjustments such as smoothing, restrictions, and relativities.
    contents:
      - prepare_refinement
      - autoplot.rating_refinement
      - add_smoothing
      - edit_smoothing
      - add_restriction
      - add_relativities
      - relativities_list
      - split_level
      - split_relativities
      - refit

  - title: "Validation"
    desc: >
      Assess model fit, predictive stability, dispersion, and residual behaviour.
    contents:
      - model_performance
      - rmse
      - bootstrap_performance
      - autoplot.bootstrap_performance
      - check_overdispersion
      - check_residuals
      - autoplot.check_residuals

  - title: "Model structure"
    desc: >
      Extract model data and analyse observed rating-grid combinations.
    contents:
      - extract_model_data
      - rating_grid

  - title: "Distribution helpers"
    desc: >
      Helper functions for truncated and actuarial distribution workflows.
    contents:
      - fit_truncated_severity
      - autoplot.truncated_severity
      - rlnormt
      - rgammat

  - title: "Utilities"
    desc: >
      Supporting functions used across pricing workflows.
    contents:
      - set_reference_level
      - split_periods_to_months
      - active_rows_by_date
      - merge_date_ranges

  - title: "Data"
    contents:
      - MTPL
      - MTPL2

  - title: "Deprecated"
    desc: >
      Legacy functions retained for backward compatibility. New code should use the updated API.
    contents:
      - univariate
      - riskfactor_gam
      - fit_gam
      - rating_factors
      - rating_factors2
      - model_data
      - construct_model_points
      - construct_tariff_classes
      - bootstrap_rmse
      - fit_truncated_dist
      - fisher_classify
      - fisher
      - histbin
      - biggest_reference
      - restrict_coef
      - smooth_coef
      - refit_glm
      - update_glm
      - period_to_months
      - rows_per_date
      - reduce
